{% extends 'base/base.html' %}

{% block title %}
    DIOSTUDIO - 新增文章
{% endblock %}

{% block content %}

    <section id="content-wrap" class="site-page">
        <div class="row">
            <div class="col-twelve">
                <section>
                    <div class="primary-content">
                        <form name="cForm" id="cForm" method="post" action="">
                            {{ form.csrf_token }}
                            <fieldset>
                                <div class="form-field">
                                    <label for="cTitle">
                                        {{ form.cTitle }}
                                    </label>
                                </div>

                                <div class="form-field">
                                    <label for="cSummary">
                                        {{ form.cSummary }}
                                    </label>
                                </div>

                                <div class="message form-field">
                                    <label for="cContent">
                                        {{ form.cContent }}
                                    </label>
                                </div>
                                <div class="message form-field">
                                    <label for="cAlbum"></label>
                                    <div class="ss-custom-select">
                                        <label for="sampleRecipientInput"></label>
                                        <select class="full-width" id="sampleRecipientInput">
                                            <option value="无">无</option>
                                            {% for album in albums %}
                                                {% for title in album %}
                                                    <option value="{{ title }}">{{ title }}</option>
                                                {% endfor %}
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                                <div class="message form-field">
                                    <label for="cAlbumOrder">
                                        {{ form.cAlbumOrder }}
                                    </label>
                                </div>
                                <div class="message form-field">
                                    <label for="cCategory"></label>
                                    <div class="ss-custom-select">
                                        <label for="sampleRecipientInput"></label>
                                        <select class="full-width" id="sampleRecipientInput">
                                            <option value="无">无</option>
                                            {% for category in categories %}
                                                {% for title in category %}
                                                    <option value="{{ title }}">{{ title }}</option>
                                                {% endfor %}
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                                <div class="message form-field">
                                    <label for="cKeywords">
                                        {{ form.cKeywords }}
                                    </label>
                                </div>
                                {{ form.cSubmit }}
                            </fieldset>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </section>

{% endblock %}
